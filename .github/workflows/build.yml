name: Build Android APK

on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq python3-dev python3-pip build-essential \
            libltdl-dev libffi-dev libssl-dev autoconf libtool cmake git zip unzip \
            libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev \
            libgstreamer1.0-dev gstreamer1.0-tools libgstreamer-plugins-base1.0-dev \
            libmtdev-dev libgl1-mesa-dev libgles2-mesa-dev

      - name: Setup pip mirror (Tsinghua)
        run: |
          pip config set global.index-url https://pypi.tuna.tsinghua.edu.cn/simple
          pip config set global.trusted-host pypi.tuna.tsinghua.edu.cn

      - name: Install Buildozer
        run: |
          pip install --upgrade pip setuptools wheel
          pip install cython buildozer

      - name: Pre-clone and patch python-for-android
        run: |
          P4A_DIR="android/.buildozer/android/platform/python-for-android"
          mkdir -p "$(dirname $P4A_DIR)"
          git clone --depth 1 -b develop https://github.com/kivy/python-for-android.git "$P4A_DIR"
          python3 android/patch_recipes.py "$P4A_DIR"

      - name: Build APK
        working-directory: android
        run: |
          mkdir -p ~/.android
          echo "sdk.dir=$HOME/.buildozer/android/platform/android-sdk" > ~/.android/buildozer.ini 2>/dev/null || true
          buildozer android debug

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: video-extractor-apk
          path: android/bin/*.apk
          retention-days: 30
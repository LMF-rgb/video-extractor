name: Build Android APK

on:
  push:
    branches: [master, main]
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq python3-dev python3-pip build-essential \
            libltdl-dev libffi-dev libssl-dev autoconf libtool cmake git zip unzip

      - name: Install Buildozer
        run: |
          pip install cython buildozer

      - name: Build APK
        working-directory: android
        run: |
          # 接受 SDK 许可
          mkdir -p ~/.android
          echo "sdk.dir=$HOME/.buildozer/android/platform/android-sdk" > ~/.android/buildozer.ini 2>/dev/null || true
          yes | buildozer android debug || true
          # 第二次尝试（有时第一次会因为下载失败）
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: 视频提取器-APK
          path: android/bin/*.apk
          retention-days: 30

name: Build Android APK

on:
  push:
    branches: [master, main]
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq python3-dev python3-pip build-essential \
            libltdl-dev libffi-dev libssl-dev autoconf libtool cmake git zip unzip \
            libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev \
            libgstreamer1.0-dev gstreamer1.0-tools libgstreamer-plugins-base1.0-dev \
            libmtdev-dev libgl1-mesa-dev libgles2-mesa-dev xclip xsel

      - name: Install Buildozer
        run: |
          pip install cython buildozer

      - name: Fix buildozer.spec for GitHub Actions
        working-directory: android
        run: |
          sed -i '/^p4a\.url/d' buildozer.spec
          sed -i '/^p4a\.fork/d' buildozer.spec

      - name: Pre-clone and patch python-for-android
        run: |
          P4A_DIR="android/.buildozer/android/platform/python-for-android"
          mkdir -p "$(dirname $P4A_DIR)"
          git clone --depth 1 -b master https://github.com/kivy/python-for-android.git "$P4A_DIR"
          # Patch Python version to 3.12 for Kivy compatibility (handle both quote styles)
          for recipe in hostpython3 python3; do
            RECIPE="$P4A_DIR/pythonforandroid/recipes/$recipe/__init__.py"
            sed -i 's/version = .3\.14\.[0-9]\+./version = "3.12.10"/' "$RECIPE"
            echo "Patched $recipe:"
            grep "version = " "$RECIPE" | head -1
          done

      - name: Build APK
        working-directory: android
        run: |
          mkdir -p ~/.android
          echo "sdk.dir=$HOME/.buildozer/android/platform/android-sdk" > ~/.android/buildozer.ini 2>/dev/null || true
          yes | buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: 视频提取器-APK
          path: android/bin/*.apk
          retention-days: 30
